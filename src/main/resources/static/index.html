<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalStream | Buy Stars</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .checkout-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #111827; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #374151; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px;}
        button:hover { background-color: #4338ca; }
        .receipt { margin-top: 20px; padding: 15px; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 6px; display: none; }
        .receipt h3 { margin: 0 0 10px 0; color: #065f46; font-size: 16px;}
        .receipt p { margin: 5px 0; font-size: 14px; color: #047857; }
        .processor-badge { display: inline-block; padding: 3px 8px; background: #10b981; color: white; border-radius: 12px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="checkout-box">
    <h2>Buy 1,000 Stars ⭐️</h2>
    <p style="color: #6b7280; font-size: 14px; margin-bottom: 20px;">Support your favorite creators.</p>

    <div class="form-group">
        <label>Amount (USD)</label>
        <input type="number" id="amount" value="8.50" disabled>
    </div>

    <div class="form-group">
        <label>Your Region (Simulates Global Volume)</label>
        <select id="country">
            <option value="BR">Brazil (LatAm)</option>
            <option value="NG">Nigeria (Africa)</option>
            <option value="US">United States (NA)</option>
            <option value="ID">Indonesia (SEA)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Payment Method</label>
        <select id="method">
            <option value="CARD">Credit/Debit Card</option>
            <option value="PIX">PIX (Brazil)</option>
            <option value="MPESA">M-Pesa (Africa)</option>
        </select>
    </div>

    <button onclick="processPayment()">Pay $8.50</button>

    <div class="receipt" id="receipt">
        <h3>Payment Successful!</h3>
        <p><strong>Transaction ID:</strong> <span id="txId"></span></p>
        <p><strong>Routed Via:</strong> <span class="processor-badge" id="processor"></span></p>
        <p><i id="message"></i></p>
    </div>
</div>

<script>
    async function processPayment() {
        const payload = {
            userId: "USER_" + Math.floor(Math.random() * 10000),
            amount: 8.50,
            currency: "USD",
            countryCode: document.getElementById('country').value,
            paymentMethod: document.getElementById('method').value
        };

        try {
            const response = await fetch('/api/v1/payments/process', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                document.getElementById('receipt').style.display = 'block';
                document.getElementById('txId').innerText = data.transactionId;
                document.getElementById('processor').innerText = data.processorUsed;
                document.getElementById('message').innerText = data.message;
            } else {
                alert("Payment Failed: " + data.message);
            }
        } catch (error) {
            alert("System Error: Could not reach orchestration gateway.");
        }
    }
</script>

</body>
</html>
